<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الاختبار - أ/ عبدالعزيز الفيفي</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 800px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none !important; }
        input { padding: 15px; width: 80%; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 1.2rem; }
        button { padding: 15px 30px; background: #673ab7; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card" id="start-screen">
    <h1>اختبار التناظر اللفظي</h1>
    <input type="text" id="userNameInput" placeholder="أدخل اسمك الكريم...">
    <br>
    <button onclick="startQuiz()">ابدأ الاختبار</button>
</div>

<div class="card hidden" id="quiz-screen">
    <h2 id="questionText">جاري تحميل الاختبار...</h2>
    <div id="optionsContainer"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>انتهى الاختبار</h2>
    <p id="scoreDisplay"></p>
    <button onclick="location.reload()">إعادة الاختبار</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd09YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4",
        measurementId: "G-YKJ1PTP9TH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة إرسال النتيجة (تستدعى عند انتهاء الطالب)
    window.sendResult = async (name, score) => {
        try {
            await addDoc(collection(db, "student_results"), {
                name: name,
                score: score,
                quizId: "النموذج الشامل 1",
                date: new Date().toLocaleString('ar-SA')
            });
            console.log("تم الإرسال بنجاح");
        } catch (e) { console.error("Error: ", e); }
    };
</script>

<script>
    let sName = "";
    let scoreCount = 40; // استبدلها بقيمة الدرجة الحقيقية لديك

    // دالة البدء (مفعلة عالمياً)
    window.startQuiz = function() {
        const nameInput = document.getElementById('userNameInput').value;
        if (!nameInput.trim()) return alert("الرجاء كتابة الاسم أولاً!");
        sName = nameInput;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
    };

    // دالة نهاية الاختبار (استدعها عند انتهاء الطالب)
    function endQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('scoreDisplay').innerText = `حصلت على ${scoreCount} درجة`;
        
        // إرسال البيانات فوراً
        if (window.sendResult) {
            window.sendResult(sName, scoreCount);
        }
    }
</script>
</body>
</html>
