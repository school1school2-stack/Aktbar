<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القدرات اللفظي التجريبي</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .timer { font-size: 24px; color: var(--danger); font-weight: bold; text-align: center; margin: 10px 0; }
        .question-card { display: none; }
        .active { display: block; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: right; background: none; font-size: 16px; }
        .option:hover { background: #f0f7ff; border-color: var(--secondary); }
        .btn { background: var(--secondary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .result-table th, .result-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .correct { color: var(--success); font-weight: bold; }
        .wrong { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <div class="header"><h1>اختبار القدرات اللفظي (48 سؤال)</h1></div>
        <div class="input-group">
            <label>اسم الطالب:</label>
            <input type="text" id="studentName" placeholder="أدخل اسمك الثلاثي">
        </div>
        <div class="input-group">
            <label>الفصل:</label>
            <input type="text" id="studentClass" placeholder="أدخل فصلك (مثلاً: 1/3)">
        </div>
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار الآن</button>
    </div>

    <div id="quiz-screen" style="display:none;">
        <div class="timer">الوقت المتبقي: <span id="time-left">60</span> ثانية</div>
        <div id="question-container"></div>
    </div>

    <div id="result-screen" style="display:none;">
        <div class="header"><h2>نتيجتك النهائية</h2></div>
        <p id="student-info-display"></p>
        <div id="score-summary" style="font-size: 20px; text-align: center; margin: 20px;"></div>
        <table class="result-table">
            <thead>
                <tr>
                    <th>السؤال</th>
                    <th>إجابتك</th>
                    <th>الصحيحة</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
        <br>
        <button class="btn" onclick="location.reload()">إعادة الاختبار</button>
    </div>
</div>

<script>
    // نموذج لـ 48 سؤال (يمكنك تغيير النصوص لاحقاً)
    const questions = [];
    const categories = ["تناظر لفظي", "إكمال جمل", "خطأ سياقي", "استيعاب مقروء"];
    
    // إنشاء بيانات تجريبية (48 سؤال)
    for(let i=1; i<=48; i++) {
        questions.push({
            id: i,
            category: categories[Math.floor(Math.random() * categories.length)],
            text: `سؤال رقم ${i}: ما هي العلاقة المشابهة لـ (رئة : تنفس)؟`,
            options: ["قلب : ضخ", "عين : عمى", "أذن : صمم", "رأس : شعر"],
            correct: 0
        });
    }

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    let timeLeft = 60;
    let userAnswers = [];

    function startQuiz() {
        const name = document.getElementById('studentName').value;
        const sClass = document.getElementById('studentClass').value;
        if(!name || !sClass) return alert("يرجى إدخال الاسم والفصل");

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timer);
        timeLeft = 60;
        document.getElementById('time-left').innerText = timeLeft;
        
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if(timeLeft <= 0) nextQuestion(null);
        }, 1000);

        const q = questions[currentQuestionIndex];
        let html = `<h3>[${q.category}]</h3><p>${q.text}</p>`;
        q.options.forEach((opt, index) => {
            html += `<button class="option" onclick="nextQuestion(${index})">${opt}</button>`;
        });
        document.getElementById('question-container').innerHTML = html;
    }

    function nextQuestion(selectedIndex) {
        userAnswers.push({
            question: questions[currentQuestionIndex].text,
            userAns: selectedIndex !== null ? questions[currentQuestionIndex].options[selectedIndex] : "لم يتم الحل",
            correctAns: questions[currentQuestionIndex].options[questions[currentQuestionIndex].correct],
            isCorrect: selectedIndex === questions[currentQuestionIndex].correct
        });

        if(selectedIndex === questions[currentQuestionIndex].correct) score++;

        currentQuestionIndex++;
        if(currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        clearInterval(timer);
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        const name = document.getElementById('studentName').value;
        const sClass = document.getElementById('studentClass').value;
        document.getElementById('student-info-display').innerText = `الطالب: ${name} | الفصل: ${sClass}`;
        document.getElementById('score-summary').innerHTML = `حصلت على <b>${score}</b> من أصل <b>${questions.length}</b>`;

        let tableHtml = '';
        userAnswers.forEach(ans => {
            tableHtml += `<tr>
                <td>${ans.question}</td>
                <td class="${ans.isCorrect ? 'correct' : 'wrong'}">${ans.userAns}</td>
                <td class="correct">${ans.correctAns}</td>
            </tr>`;
        });
        document.getElementById('results-body').innerHTML = tableHtml;
    }
</script>

</body>
</html>
